name: Publish Release

# Fires automatically when you publish a GitHub Release,
# OR manually from Actions → Publish Release → Run workflow.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 1.2.9)"
        required: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build the JAR once and share it with the publish jobs below.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      jar_path: ${{ steps.find_jar.outputs.jar_path }}
      version:  ${{ steps.find_jar.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/wrapper-validation-action@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shadow JAR
        run: ./gradlew :blockprot-spigot:shadowJar --no-daemon

      - name: Locate JAR
        id: find_jar
        run: |
          JAR=$(find spigot/build/libs -name "BlockProt-*.jar" \
                ! -name "*-javadoc*" ! -name "*-sources*" | head -1)
          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"
          # Extract version string from filename: BlockProt-1.2.9-SNAPSHOT.jar → 1.2.9-SNAPSHOT
          VERSION=$(basename "$JAR" .jar | sed 's/^BlockProt-//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR  (version=$VERSION)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockprot-jar
          path: ${{ steps.find_jar.outputs.jar_path }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Modrinth — project: blockprot-reloaded
  # ────────────────────────────────────────────────────────────────────────────
  publish_modrinth:
    name: Publish → Modrinth
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        if: ${{ env.MODRINTH_TOKEN != '' }}
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Determine release channel
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        if: ${{ env.MODRINTH_TOKEN != '' }}
        id: channel
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qiE 'snapshot|alpha|dev|nightly|wip'; then
            echo "type=alpha" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -qiE 'beta|rc'; then
            echo "type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Modrinth
        if: ${{ secrets.MODRINTH_TOKEN != '' }}
        uses: HSGamer/action-mcreleaser@main
        with:
          files: |
            ./artifacts/*.jar
          platforms: modrinth
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT: blockprot-reloaded
          MODRINTH_LOADERS: paper

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Hangar — project: VictorGugug/BlockProtPlus
  # ────────────────────────────────────────────────────────────────────────────
  publish_hangar:
    name: Publish → Hangar
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        env:
          HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
        if: ${{ env.HANGAR_TOKEN != '' }}
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Determine Hangar channel
        env:
          HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
        if: ${{ env.HANGAR_TOKEN != '' }}
        id: channel
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qiE 'snapshot|alpha|dev|nightly|wip'; then
            echo "name=Snapshot" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -qiE 'beta|rc'; then
            echo "name=Beta" >> "$GITHUB_OUTPUT"
          else
            echo "name=Release" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Hangar
        if: ${{ secrets.HANGAR_TOKEN != '' }}
        uses: HSGamer/action-mcreleaser@main
        with:
          files: |
            ./artifacts/*.jar
          platforms: hangar
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HANGAR_KEY: ${{ secrets.HANGAR_TOKEN }}
          HANGAR_PROJECT: VictorGugug/BlockProtPlus
          HANGAR_PLATFORM: paper
