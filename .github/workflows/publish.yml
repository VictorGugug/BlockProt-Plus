name: Publish Release

# Fires automatically when you publish a GitHub Release,
# OR manually from Actions → Publish Release → Run workflow.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 1.2.9)"
        required: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Build the JAR once and share it with the publish jobs below.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      jar_path: ${{ steps.find_jar.outputs.jar_path }}
      version:  ${{ steps.find_jar.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/wrapper-validation-action@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shadow JAR
        run: ./gradlew :blockprot-spigot:shadowJar --no-daemon

      - name: Locate JAR
        id: find_jar
        run: |
          JAR=$(find spigot/build/libs -name "BlockProt-*.jar" \
                ! -name "*-javadoc*" ! -name "*-sources*" | head -1)
          echo "jar_path=$JAR" >> "$GITHUB_OUTPUT"
          # Extract version string from filename: BlockProt-1.2.9-SNAPSHOT.jar → 1.2.9-SNAPSHOT
          VERSION=$(basename "$JAR" .jar | sed 's/^BlockProt-//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR  (version=$VERSION)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockprot-jar
          path: ${{ steps.find_jar.outputs.jar_path }}
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Modrinth
  #
  # Setup (one-time):
  #   • Go to modrinth.com → Settings → Personal access tokens → Create token
  #   • GitHub repo → Settings → Secrets and variables → Actions → New secret
  #       Name:  MODRINTH_TOKEN
  #       Value: (your token)
  #   • After creating your project on Modrinth, copy its ID or slug and add:
  #       Name:  MODRINTH_PROJECT_ID
  #       Value: blockprot-sp26-zv   (your project slug)
  # ────────────────────────────────────────────────────────────────────────────
  publish_modrinth:
    name: Publish → Modrinth
    needs: build
    runs-on: ubuntu-latest
    # Skips silently if the secret is not configured yet.
    if: ${{ secrets.MODRINTH_TOKEN != '' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Determine release channel
        id: channel
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qiE 'snapshot|alpha|dev|nightly|wip'; then
            echo "type=alpha" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -qiE 'beta|rc'; then
            echo "type=beta" >> "$GITHUB_OUTPUT"
          else
            echo "type=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Modrinth
        uses: modrinth/minotaur@v2
        with:
          token:          ${{ secrets.MODRINTH_TOKEN }}
          project_id:     ${{ secrets.MODRINTH_PROJECT_ID }}
          version_type:   ${{ steps.channel.outputs.type }}
          name:           "BlockProt SP26-ZV ${{ needs.build.outputs.version }}"
          version_number: ${{ needs.build.outputs.version }}
          changelog:      ${{ github.event.release.body || 'See the GitHub release for the full changelog.' }}
          files:          ./artifacts/*.jar
          game_versions: |
            1.21
            1.21.1
            1.21.4
          loaders: |
            paper
            spigot
            bukkit

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Hangar (PaperMC)
  #
  # Setup (one-time):
  #   • Go to hangar.papermc.io → Settings → API keys → Create key
  #     (permissions needed: create_version)
  #   • GitHub repo → Settings → Secrets → New secret
  #       Name:  HANGAR_TOKEN
  #       Value: (your API key)
  #   • Create your project on Hangar first, then set the slug below in the
  #     'slug' field (format: YourUsername/YourProjectSlug).
  # ────────────────────────────────────────────────────────────────────────────
  publish_hangar:
    name: Publish → Hangar
    needs: build
    runs-on: ubuntu-latest
    if: ${{ secrets.HANGAR_TOKEN != '' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Determine Hangar channel
        id: channel
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          if echo "$VERSION" | grep -qiE 'snapshot|alpha|dev|nightly|wip'; then
            echo "name=Snapshot" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -qiE 'beta|rc'; then
            echo "name=Beta" >> "$GITHUB_OUTPUT"
          else
            echo "name=Release" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Hangar
        uses: HangarMC/hangar-publish-plugin@v0.1.0
        with:
          # Change to your Hangar username/project-slug after creating the project.
          slug:          "VictorGugug/BlockProt-SP26-ZV"
          version:       ${{ needs.build.outputs.version }}
          channel:       ${{ steps.channel.outputs.name }}
          changelog:     ${{ github.event.release.body || 'See the GitHub release for the full changelog.' }}
          api_key:       ${{ secrets.HANGAR_TOKEN }}
          files:         ./artifacts/*.jar
          game_versions: "1.21,1.21.1,1.21.4"
          platforms:     "PAPER"
