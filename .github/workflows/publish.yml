name: Publish Release

# Fires automatically when the release workflow publishes a GitHub Release,
# OR manually from Actions → Publish Release → Run workflow.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 1.3.1)"
        required: true

jobs:
  # ── Build JAR ──────────────────────────────────────────────────────────────
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    outputs:
      jar_path: ${{ steps.jar.outputs.path }}
      version:  ${{ steps.jar.outputs.version }}
      channel:  ${{ steps.jar.outputs.channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/wrapper-validation-action@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build shadow JAR
        run: ./gradlew :spigot:shadowJar --no-daemon

      - name: Locate JAR and resolve metadata
        id: jar
        run: |
          JAR=$(find spigot/build/libs -name "BlockProtReloaded-*.jar" \
                ! -name "*-javadoc*" ! -name "*-sources*" | head -1)
          VERSION=$(basename "$JAR" .jar | sed 's/^BlockProtReloaded-//')

          if echo "$VERSION" | grep -qiE 'snapshot|alpha|dev|nightly|wip'; then
            CHANNEL="alpha"
          elif echo "$VERSION" | grep -qiE 'beta|rc'; then
            CHANNEL="beta"
          else
            CHANNEL="release"
          fi

          echo "path=$JAR"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR  (version=$VERSION, channel=$CHANNEL)"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockprot-jar
          path: ${{ steps.jar.outputs.path }}
          retention-days: 1

  # ── Modrinth ───────────────────────────────────────────────────────────────
  publish_modrinth:
    name: Publish → Modrinth
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Resolve changelog
        id: notes
        run: |
          # Use the GitHub Release body when triggered by a release event,
          # otherwise fall back to the tag name.
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "body<<EOF"                             >> "$GITHUB_OUTPUT"
            echo "${{ github.event.release.body }}"     >> "$GITHUB_OUTPUT"
            echo "EOF"                                   >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ needs.build.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: blockprot-reloaded
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: ./artifacts/*.jar
          name: "BlockProt Reloaded ${{ needs.build.outputs.version }}"
          version: ${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.channel }}
          changelog: ${{ steps.notes.outputs.body }}

          # Supported Minecraft versions
          game-versions: |
            1.21
            1.21.1
            1.21.4
          loaders: |
            paper
            spigot
          java: 21

  # ── Hangar ─────────────────────────────────────────────────────────────────
  publish_hangar:
    name: Publish → Hangar
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blockprot-jar
          path: ./artifacts

      - name: Resolve changelog
        id: notes
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "body<<EOF"                             >> "$GITHUB_OUTPUT"
            echo "${{ github.event.release.body }}"     >> "$GITHUB_OUTPUT"
            echo "EOF"                                   >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ needs.build.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Hangar channel
        id: channel
        run: |
          case "${{ needs.build.outputs.channel }}" in
            alpha)   echo "name=Snapshot" >> "$GITHUB_OUTPUT" ;;
            beta)    echo "name=Beta"     >> "$GITHUB_OUTPUT" ;;
            *)       echo "name=Release"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Upload to Hangar
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          hangar-id: VictorGugug/BlockProtPlus
          hangar-token: ${{ secrets.HANGAR_TOKEN }}

          files: ./artifacts/*.jar
          name: "BlockProt Reloaded ${{ needs.build.outputs.version }}"
          version: ${{ needs.build.outputs.version }}
          version-type: ${{ needs.build.outputs.channel }}
          changelog: ${{ steps.notes.outputs.body }}

          game-versions: |
            1.21
            1.21.1
            1.21.4
          loaders: |
            paper
            spigot
          java: 21
