name: Release

# Trigger: manually from Actions → Release → Run workflow.
# After it creates the GitHub Release, the publish workflow fires automatically.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.1 or 1.3.1-SNAPSHOT)"
        required: true

jobs:
  release:
    name: Build & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Changelog ──────────────────────────────────────────────────────────
      - name: Generate changelog
        uses: FabricMC/fabric-action-scripts@v2
        id: changelog
        with:
          context: changelog
          workflow_id: release.yml
          commit_regex: (Bump|Codechange|[a-zA-Z].* \[GH\]:|Build\(deps\))(.*)

      # ── Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/wrapper-validation-action@v2

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build shadow JAR
        run: ./gradlew :spigot:shadowJar --no-daemon

      - name: Locate JAR
        id: jar
        run: |
          JAR=$(find spigot/build/libs -name "BlockProtReloaded-*.jar" \
                ! -name "*-javadoc*" ! -name "*-sources*" | head -1)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $JAR)" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "BlockProt Reloaded ${{ github.event.inputs.version }}"
          body: ${{ steps.changelog.outputs.changelog }}
          files: ${{ steps.jar.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'SNAPSHOT') || contains(github.event.inputs.version, 'beta') || contains(github.event.inputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: blockprot-jar
          path: ${{ steps.jar.outputs.path }}
          retention-days: 1
