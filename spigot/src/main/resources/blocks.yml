# ──────────────────── SHULKER BOXES ─────────────────────────────────
# ════════════════════════════════════════════════════════════════════
# All 16 colour variants of the shulker box.

lockable_shulker_boxes:
  - SHULKER_BOX
  - WHITE_SHULKER_BOX
  - LIGHT_GRAY_SHULKER_BOX
  - GRAY_SHULKER_BOX
  - BLACK_SHULKER_BOX
  - BROWN_SHULKER_BOX
  - RED_SHULKER_BOX
  - ORANGE_SHULKER_BOX
  - YELLOW_SHULKER_BOX
  - LIME_SHULKER_BOX
  - GREEN_SHULKER_BOX
  - CYAN_SHULKER_BOX
  - LIGHT_BLUE_SHULKER_BOX
  - BLUE_SHULKER_BOX
  - PURPLE_SHULKER_BOX
  - MAGENTA_SHULKER_BOX
  - PINK_SHULKER_BOX

