  - BIRCH_FENCE_GATE
  - JUNGLE_FENCE_GATE
  - ACACIA_FENCE_GATE
  - DARK_OAK_FENCE_GATE
  - MANGROVE_FENCE_GATE
  - CHERRY_FENCE_GATE
  - PALE_OAK_FENCE_GATE
  - BAMBOO_FENCE_GATE
  - CRIMSON_FENCE_GATE
  - WARPED_FENCE_GATE

  # ── Wooden trapdoors ─────────────────────────────────────────────
  - OAK_TRAPDOOR
  - SPRUCE_TRAPDOOR
  - BIRCH_TRAPDOOR
  - JUNGLE_TRAPDOOR
  - ACACIA_TRAPDOOR
  - DARK_OAK_TRAPDOOR
  - MANGROVE_TRAPDOOR
  - CHERRY_TRAPDOOR
  - PALE_OAK_TRAPDOOR
  - BAMBOO_TRAPDOOR
  - CRIMSON_TRAPDOOR
