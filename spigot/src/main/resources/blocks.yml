# ┌─────────────────────────────────────────────────────────────────┐
# │                   BlockProt — Block Definitions                  │
# │                        SP26-ZV Edition                          │
# ├─────────────────────────────────────────────────────────────────┤
# │  This file is generated on first start and read at runtime.     │
# │  Add or remove Bukkit Material names from any list below to     │
# │  control which blocks players can lock.                         │
# │  Run  /bp reload  to apply changes without restarting.          │
# └─────────────────────────────────────────────────────────────────┘

# ════════════════════════════════════════════════════════════════════
# ─────────────────── TILE ENTITIES ──────────────────────────────────
# ════════════════════════════════════════════════════════════════════
# Containers and interactive blocks that store NBT data.

lockable_tile_entities:
  - CHEST
  - TRAPPED_CHEST
  - FURNACE
  - SMOKER
  - BLAST_FURNACE
  - HOPPER
  - BARREL
  - BREWING_STAND
  - DISPENSER
  - DROPPER
  - LECTERN

