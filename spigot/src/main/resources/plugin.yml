name: BlockProt
version: ${version}
main: de.sean.blockprot.bukkit.BlockProt
api-version: '1.21'
authors: [ Zar ]
description: Block protection plugin — BlockProt Reloaded
prefix: BlockProt
website: https://github.com/VictorGugug/BlockProt-Reloaded
permissions:
  blockprot.lock:
    default: true
    description: Allows a player to lock blocks
  blockprot.info:
    default: op
    description: Allows a player to view info on any locked blocks
  blockprot.admin:
    default: false
    description: Allows a player to unlock and edit blocks that do not belong to them, and use admin commands like /bp info.
  blockprot.bypass:
    default: false
    description: Allows a player to bypass any protection, effectively having access to every block.
  blockprot.lockmax:
    default: false
    description: Removes or overrides the restriction from player_max_locked_block_count. To override, use blockprot.locklimit.<number>.
  blockprot.locklimit.<number>:
    default: false
    description: Sets a per-player block lock limit. e.g. blockprot.locklimit.50
  blockprot.debug:
    default: false
    description: Allows a player to execute debug commands.
commands:
  blockprot:
    description: The main blockprot command
    usage: "/blockprot [help|settings|friends|stats|about|integrations|update|reload|disablehints|debug]"
    aliases: ["bp"]
softdepend:
  - Towny
  - PlaceholderAPI
  - WorldGuard
  - Lands
  - ClaimChunk
